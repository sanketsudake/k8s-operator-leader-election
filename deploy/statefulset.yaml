apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: leader-demo-statefulset
  namespace: default
  labels:
    app: leader-demo
    strategy: statefulset
spec:
  serviceName: leader-demo-statefulset
  replicas: 2
  selector:
    matchLabels:
      app: leader-demo
      strategy: statefulset
  template:
    metadata:
      labels:
        app: leader-demo
        strategy: statefulset
    spec:
      serviceAccountName: leader-demo
      containers:
        - name: demo
          image: leader-demo:local
          imagePullPolicy: Never
          env:
            - name: STRATEGY
              value: "statefulset"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEASE_PREFIX
              value: "statefulset-lock"
---
apiVersion: v1
kind: Service
metadata:
  name: leader-demo-statefulset
  namespace: default
spec:
  clusterIP: None
  selector:
    app: leader-demo
    strategy: statefulset
  ports:
    - port: 80
      name: placeholder
