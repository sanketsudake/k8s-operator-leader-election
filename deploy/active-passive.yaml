apiVersion: apps/v1
kind: Deployment
metadata:
  name: leader-demo-active-passive
  namespace: default
  labels:
    app: leader-demo
    strategy: active-passive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leader-demo
      strategy: active-passive
  template:
    metadata:
      labels:
        app: leader-demo
        strategy: active-passive
    spec:
      serviceAccountName: leader-demo
      containers:
        - name: demo
          image: leader-demo:local
          imagePullPolicy: Never
          env:
            - name: STRATEGY
              value: "active-passive"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEASE_PREFIX
              value: "active-passive-lock"
